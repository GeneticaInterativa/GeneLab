    <script>
        const casos = {
            1: {
                nome: "Casal J. e M.",
                subtitulo: "Prontuário #001 · Genética",
                modo: "montagem",
                tipo: "autossomico-recessivo",
                texto: "<strong>Caso Clínico: Fibrose Cística</strong><br><br>Uma família procura aconselhamento genético após o nascimento da criança III.2, que manifestou sintomas severos de uma patologia autossômica recessiva. Os avós parentais (Geração I) e os tios (II.1) não manifestam a doença clinicamente. O pai (II.3) e a mãe (II.2) são fenotipicamente normais. Sabe-se que a linhagem materna guarda um histórico antigo da mutação.<br><br><em>Desafio:</em> Analise o fluxo do heredograma, identifique o indivíduo afetado e mapeie quais familiares atuam obrigatoriamente como portadores silenciosos (heterozigotos) para que a condição se manifeste na prole.",
                gabarito: { i1: 'saudavel', i2: 'portador', ii1: 'saudavel', ii2: 'portador', ii3: 'portador', iii1: 'saudavel', iii2: 'afetado', iii3: 'saudavel' }
            },
            2: {
                nome: "Paciente E.S.",
                subtitulo: "Prontuário #002 · Hematologia",
                modo: "montagem",
                tipo: "ligado-x",
                texto: "<strong>Caso Clínico: Hemofilia Grave</strong><br><br>Investigação de um distúrbio severo de coagulação sanguínea. Na Geração I, o avô materno (I.1) apresenta o quadro clínico ativo, enquanto sua parceira (I.2) é saudável. Na Geração II, a descendente direta uniu-se a um homem saudável (II.3). O casal teve três filhos, sendo que um deles (III.2) herdou a anomalia hemofílica.<br><br><em>Desafio:</em> Rastreie a transmissão cromossômica sexual. Determine o indivíduo afetado e descubra qual membro da família serviu como a única ponte genética feminina intermediária (portadora).",
                gabarito: { i1: 'afetado', i2: 'saudavel', ii1: 'saudavel', ii2: 'portador', ii3: 'saudavel', iii1: 'saudavel', iii2: 'afetado', iii3: 'saudavel' }
            },
            3: {
                nome: "Paciente C.H.",
                subtitulo: "Prontuário #003 · Ortopedia",
                modo: "montagem",
                tipo: "autossomico-dominante",
                texto: "<strong>Caso Clínico: Acondroplasia</strong><br><br>Análise de um heredograma multigeracional com traços de displasia esquelética. Observa-se que a avó (I.2) manifesta a condição patológica, ao passo que o avô (I.1) possui fenótipo esquelético normal. O traço foi transmitido para a mãe (II.2), mas não para o tio (II.1). A mãe casou-se com um parceiro saudável (II.3), gerando três filhos, onde apenas o descendente III.2 herdou a desordem.<br><br><em>Desafio:</em> Aplique os critérios lógicos de herança dominante para assinalar corretamente todos os indivíduos afetados expressivos na árvore.",
                gabarito: { i1: 'saudavel', i2: 'afetado', ii1: 'saudavel', ii2: 'afetado', ii3: 'saudavel', iii1: 'saudavel', iii2: 'afetado', iii3: 'saudavel' }
            },
            4: {
                nome: "Casal G.H.",
                subtitulo: "Prontuário #004 · Oftalmologia",
                modo: "montagem",
                tipo: "ligado-x",
                texto: "<strong>Caso Clínico: Daltonismo</strong><br><br>Estudo oftalmológico focado em anomalias de percepção de cores. A avó materna (I.2) manifesta daltonismo completo, enquanto o avô (I.1) possui visão cromática normal. Esse cruzamento resultou em um filho homem (II.1) afetado. A filha (II.2) nasceu com visão normal e uniu-se a um homem saudável (II.3). O casal gerou descendentes, culminando no aparecimento do traço em III.3.<br><br><em>Desafio:</em> Desvende a herança recessiva, identificando o grau de expressão em homens e o papel oculto das mulheres na transmissão.",
                gabarito: { i1: 'saudavel', i2: 'afetado', ii1: 'afetado', ii2: 'portador', ii3: 'saudavel', iii1: 'saudavel', iii2: 'saudavel', iii3: 'afetado' }
            },
            5: {
                nome: "Paciente M.O.",
                subtitulo: "Prontuário #005 · Reprodução",
                modo: "montagem",
                tipo: "autossomico-recessivo",
                texto: "<strong>Caso Clínico: Albinismo</strong><br><br>Avaliação de distúrbio metabólico na síntese de melanina. Nenhum dos avós da Geração I apresenta alterações fenotípicas visíveis, mas investigações retrospectivas apontam portadores ocultos em ambas as famílias. Na Geração II, o indivíduo II.1 manifesta albinismo. A descendente II.2, sem sintomas, uniu-se a um parceiro (II.3) que também guardava a mutação oculta. Desse cruzamento, nasceu a criança III.1 com a condição.<br><br><em>Desafio:</em> Localize o paciente afetado e deduza com rigor lógico todos os portadores heterozigotos escondidos nas gerações anteriores.",
                gabarito: { i1: 'portador', i2: 'portador', ii1: 'afetado', ii2: 'portador', ii3: 'portador', iii1: 'afetado', iii2: 'saudavel', iii3: 'saudavel' }
            },
            6: {
                nome: "Paciente R.V.",
                subtitulo: "Prontuário #006 · Endocrinologia",
                modo: "montagem",
                tipo: "ligado-y",
                texto: "<strong>Caso Clínico: Distúrbio Fenotípico Restrito</strong><br><br>Investigação de um traço dermatológico curioso em uma família acompanhada pelo laboratório. Observa-se que o avô paterno (I.1) apresenta o traço característico, enquanto sua parceira (I.2) não exibe nenhuma alteração. O pai (II.3) e o tio (II.1) manifestam exatamente a mesma condição física. Na descendência III, o traço manifesta-se nos filhos homens.<br><br><em>Desafio:</em> Analise atentamente a distribuição dos afetados ao longo das gerações e descubra qual é o padrão oculto de herança que restringe a manifestação da condição.",
                gabarito: { i1: 'afetado', i2: 'saudavel', ii1: 'afetado', ii2: 'saudavel', ii3: 'afetado', iii1: 'saudavel', iii2: 'afetado', iii3: 'afetado' }

                opcoes: [
                    { letra: 'a', texto: "Trata-se de uma característica autossômica recessiva.", correta: false },
                    { letra: 'b', texto: "O genótipo do indivíduo 3 é certamente Aa.", correta: true },
                    { letra: 'c', texto: "Os indivíduos 4 e 7 apresentam os mesmos genótipos e fenótipos.", correta: false },
                    { letra: 'd', texto: "Os indivíduos 1, 2 e 6 têm o mesmo genótipo.", correta: false }
                ],
                explicacao: "<strong>Gabarito: Letra B</strong><br><br>O indivíduo 3 é fenotipicamente normal filho de pais normais portadores (Aa x Aa), logo seu genótipo pode ser AA ou Aa (probabilidade de 2/3 de ser Aa), portanto afirmar que ele é <em>certamente</em> Aa está incorreto."
            },
            8: {
                nome: "Questão PUC-PR",
                subtitulo: "Vestibular · Análise de Heredograma",
                modo: "interpretacao",
                referencia: "PUC-PR",
                enunciado: "Analisando o heredograma a seguir, conclui-se que dois dos dez indivíduos são vítimas de uma anomalia causada pela ação de um gene recessivo. Assinale a opção que contém os números que representam indivíduos cujos genótipos não podem ser determinados:",
                opcoes: [
                    { letra: 'a', texto: "1, 2, 3, 5 e 6", correta: false },
                    { letra: 'b', texto: "5, 6 e 7", correta: false },
                    { letra: 'c', texto: "3, 8 e 10", correta: true },
                    { letra: 'd', texto: "1, 2, 5, 6, 7, 8 e 10", correta: false },
                    { letra: 'e', texto: "7, 8 e 10", correta: false }
                ],
                explicacao: "<strong>Gabarito: Letra C</strong><br><br>Como os indivíduos 1, 2, 5 e 6 tiveram filhos afetados, sabemos que são heterozigotos. Já os indivíduos 4 e 9 são homozigotos recessivos. Como o indivíduo 7 é normal, mas filho de uma mulher afetada, sabemos que ele é heterozigoto. Desse modo, não é possível determinar o genótipo de 3, 8 e 10."
            }
        };

        let casoAtual = 1;

        function renderizarListaCasos() {
            const lista = document.getElementById('lista-casos');
            lista.innerHTML = '';
            
            Object.keys(casos).forEach(id => {
                const caso = casos[id];
                const ativo = id == casoAtual ? 'ativo' : '';
                const tagClass = caso.modo === 'montagem' ? 'tag-montagem' : 'tag-interpretacao';
                const tagText = caso.modo === 'montagem' ? 'Montagem' : 'Interpretação';

                lista.innerHTML += `
                    <div class="card-prontuario ${ativo}" id="card-caso-${id}" onclick="carregarCaso(${id})">
                        <h4>${caso.nome}</h4>
                        <p>${caso.subtitulo}</p>
                        <span class="tag-tipo ${tagClass}">${tagText}</span>
                    </div>
                `;
            });
        }

        function carregarCaso(id) {
            casoAtual = id;
            renderizarListaCasos();
            
            const caso = casos[id];
            const painelCentral = document.getElementById('painel-central');
            const painelDireito = document.getElementById('painel-direito');

            if (caso.modo === 'montagem') {
                painelCentral.innerHTML = `
                    <div class="arvore-wrapper">
                        <div class="arvore" id="arvore-container">
                            <div class="linha linha-c1"></div>
                            <div class="linha haste-c1"></div>
                            <div class="linha linha-irmaos-c1"></div>
                            <div class="linha haste-tio"></div>
                            <div class="linha haste-mae"></div>
                            <div class="linha linha-c2"></div>
                            <div class="linha haste-c2"></div>
                            <div class="linha linha-irmaos-c2"></div>
                            <div class="linha haste-f1"></div>
                            <div class="linha haste-f2"></div>
                            <div class="linha haste-f3"></div>

                            <div class="nodo interativo g1-avo" data-id="i1" data-sexo="homem" onclick="mudarEstado(this)"><div class="simbolo homem"></div><span class="label">I.1</span></div>
                            <div class="nodo interativo g1-ava" data-id="i2" data-sexo="mulher" onclick="mudarEstado(this)"><div class="simbolo mulher"></div><span class="label">I.2</span></div>
                            <div class="nodo interativo g2-tio" data-id="ii1" data-sexo="homem" onclick="mudarEstado(this)"><div class="simbolo homem"></div><span class="label">II.1</span></div>
                            <div class="nodo interativo g2-mae" data-id="ii2" data-sexo="mulher" onclick="mudarEstado(this)"><div class="simbolo mulher"></div><span class="label">II.2</span></div>
                            <div class="nodo interativo g2-pai" data-id="ii3" data-sexo="homem" onclick="mudarEstado(this)"><div class="simbolo homem"></div><span class="label">II.3</span></div>
                            <div class="nodo interativo g3-f1" data-id="iii1" data-sexo="mulher" onclick="mudarEstado(this)"><div class="simbolo mulher"></div><span class="label">III.1</span></div>
                            <div class="nodo interativo g3-f2" data-id="iii2" data-sexo="homem" onclick="mudarEstado(this)"><div class="simbolo homem"></div><span class="label">III.2</span></div>
                            <div class="nodo interativo g3-f3" data-id="iii3" data-sexo="homem" onclick="mudarEstado(this)"><div class="simbolo homem"></div><span class="label">III.3</span></div>
                        </div>
                    </div>
                    <div class="legenda">
                        <div class="legenda-item"><div class="mini-simbolo"></div> Saudável</div>
                        <div class="legenda-item"><div class="mini-simbolo afetado"></div> Afetado (Doente)</div>
                        <div class="legenda-item"><div class="mini-simbolo portador"></div> Portador (Recessivo)</div>
                    </div>
                `;

                painelDireito.innerHTML = `
                    <h2 class="titulo-detalhes">Prontuário da Família</h2>
                    <div class="prontuario-texto" id="texto-prontuario">${caso.texto}</div>
                    <button class="btn-validar" onclick="validarHeredograma()">Validar Mapeamento</button>
                    <div class="mensagem-feedback" id="mensagem-feedback"></div>
                `;

            } else if (caso.modo === 'interpretacao') {
                let htmlOpcoes = '';
                caso.opcoes.forEach(op => {
                    htmlOpcoes += `
                        <div class="opcao-alt" onclick="selecionarAlternativa('${op.letra}')">
                            <input type="radio" name="vestibular" id="alt-${op.letra}" value="${op.letra}">
                            <label for="alt-${op.letra}"><b>${op.letra.toUpperCase()}</b> ${op.texto}</label>
                        </div>
                    `;
                });

                let htmlArvoreVestibular = '';
                if (caso.referencia === 'IFMG') {
                    htmlArvoreVestibular = `
                        <div class="arvore-wrapper">
                            <div class="arvore">
                                <div class="linha ifmg-l1"></div><div class="linha ifmg-h1"></div><div class="linha ifmg-li2"></div>
                                <div class="linha ifmg-h3"></div><div class="linha ifmg-h4"></div><div class="linha ifmg-h5"></div>
                                <div class="linha ifmg-l3"></div><div class="linha ifmg-h6"></div>
                                <div class="nodo ifmg-1"><div class="simbolo homem"></div><span class="label">1</span></div>
                                <div class="nodo ifmg-2"><div class="simbolo mulher"></div><span class="label">2</span></div>
                                <div class="nodo ifmg-3"><div class="simbolo mulher"></div><span class="label">3</span></div>
                                <div class="nodo ifmg-4"><div class="simbolo mulher afetado"></div><span class="label">4</span></div>
                                <div class="nodo ifmg-5"><div class="simbolo homem"></div><span class="label">5</span></div>
                                <div class="nodo ifmg-6"><div class="simbolo mulher"></div><span class="label">6</span></div>
                                <div class="nodo ifmg-7"><div class="simbolo homem afetado"></div><span class="label">7</span></div>
                            </div>
                        </div>
                    `;
                } else if (caso.referencia === 'PUC-PR') {
                    htmlArvoreVestibular = `
                        <div class="arvore-wrapper">
                            <div class="arvore" style="width: 440px;">
                                <div class="linha puc-l1"></div><div class="linha puc-h1"></div><div class="linha puc-li2"></div>
                                <div class="linha puc-h4"></div><div class="linha puc-h5"></div><div class="linha puc-l3"></div>
                                <div class="linha puc-h3"></div><div class="linha puc-h7"></div><div class="linha puc-l5"></div>
                                <div class="linha puc-h6"></div><div class="linha puc-li3"></div><div class="linha puc-h8"></div>
                                <div class="linha puc-h9"></div><div class="linha puc-h10"></div>
                                <div class="nodo puc-1"><div class="simbolo mulher"></div><span class="label">1</span></div>
                                <div class="nodo puc-2"><div class="simbolo homem"></div><span class="label">2</span></div>
                                <div class="nodo puc-3"><div class="simbolo homem"></div><span class="label">3</span></div>
                                <div class="nodo puc-4"><div class="simbolo mulher afetado"></div><span class="label">4</span></div>
                                <div class="nodo puc-5"><div class="simbolo homem"></div><span class="label">5</span></div>
                                <div class="nodo puc-6"><div class="simbolo mulher"></div><span class="label">6</span></div>
                                <div class="nodo puc-7"><div class="simbolo mulher"></div><span class="label">7</span></div>
                                <div class="nodo puc-8"><div class="simbolo mulher"></div><span class="label">8</span></div>
                                <div class="nodo puc-9"><div class="simbolo homem afetado"></div><span class="label">9</span></div>
                                <div class="nodo puc-10"><div class="simbolo mulher"></div><span class="label">10</span></div>
                            </div>
                        </div>
                    `;
                }

                painelCentral.innerHTML = `
                    <div class="painel-questao-conteudo">
                        <span class="badge-vestibular">Questão de Vestibular · ${caso.referencia}</span>
                        ${htmlArvoreVestibular}
                        <p class="texto-enunciado">${caso.enunciado}</p>
                        <div class="lista-alternativas">
                            ${htmlOpcoes}
                        </div>
                    </div>
                `;

                painelDireito.innerHTML = `
                    <h2 class="titulo-detalhes">Resolução & Gabarito</h2>
                    <div class="prontuario-texto">
                        <p>Analise o heredograma ao lado, selecione a alternativa correta e clique em verificar para testar seu raciocínio.</p>
                    </div>
                    <button class="btn-validar" onclick="validarQuestaoVestibular()">Verificar Resposta</button>
                    <div class="mensagem-feedback" id="mensagem-feedback"></div>
                `;
            }

            if (window.innerWidth <= 1024) {
                painelCentral.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function selecionarAlternativa(letra) {
            const radio = document.getElementById('alt-' + letra);
            if (radio) radio.checked = true;
            document.getElementById('mensagem-feedback').style.display = 'none';
        }

        function validarQuestaoVestibular() {
            const caso = casos[casoAtual];
            const selecionado = document.querySelector('input[name="vestibular"]:checked');
            const fb = document.getElementById('mensagem-feedback');

            if (!selecionado) {
                fb.innerHTML = `⚠️ <b>Atenção:</b> Selecione uma alternativa antes de verificar.`;
                fb.className = 'mensagem-feedback feedback-erro';
                fb.style.display = 'block';
                return;
            }

            const letraEscolhida = selecionado.value;
            const opcaoCorreta = caso.opcoes.find(op => op.correta);

            if (letraEscolhida === opcaoCorreta.letra) {
                fb.innerHTML = `✅ <b>Resposta Correta!</b>...`;
                fb.className = 'mensagem-feedback feedback-sucesso';
                
                registrarConclusaoSilenciosa("Heredograma: " + caso.nome + " (Interpretação)", "Acertou ✅");
            } else {
                fb.innerHTML = `❌ <b>Resposta Incorreta.</b>...`;
                fb.className = 'mensagem-feedback feedback-erro';
                
                registrarConclusaoSilenciosa("Heredograma: " + caso.nome + " (Interpretação)", "Errou ❌");
            }

        function casoAleatorio() {
            const ids = Object.keys(casos);
            let randomId = casoAtual;
            while(randomId == casoAtual) {
                randomId = ids[Math.floor(Math.random() * ids.length)];
            }
            carregarCaso(randomId);
            document.getElementById('card-caso-' + randomId).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        window.onload = () => {
            renderizarListaCasos();
            carregarCaso(1);
        };

        function mudarEstado(elemento) {
            const simbolo = elemento.querySelector('.simbolo');
            document.getElementById('mensagem-feedback').style.display = 'none'; 

            if (!simbolo.classList.contains('afetado') && !simbolo.classList.contains('portador')) {
                simbolo.classList.add('afetado');
            } else if (simbolo.classList.contains('afetado')) {
                simbolo.classList.remove('afetado');
                simbolo.classList.add('portador');
            } else {
                simbolo.classList.remove('portador');
            }
        }

        function validarHeredograma() {
            const gabarito = casos[casoAtual].gabarito;
            const tipoCaso = casos[casoAtual].tipo;
            
            let correto = true;
            let erroBiologicoX = false;
            let erroBiologicoY = false;
            let erroBiologicoDominante = false;
            let nomeErroBiologico = "";

            document.querySelectorAll('.nodo.interativo').forEach(nodo => {
                const id = nodo.getAttribute('data-id');
                const sexo = nodo.getAttribute('data-sexo');
                const label = nodo.querySelector('.label').innerText;
                const simbolo = nodo.querySelector('.simbolo');
                
                let estadoUsuario = 'saudavel';
                if (simbolo.classList.contains('afetado')) estadoUsuario = 'afetado';
                if (simbolo.classList.contains('portador')) estadoUsuario = 'portador';

                if (tipoCaso === "ligado-x" && sexo === "homem" && estadoUsuario === "portador") {
                    erroBiologicoX = true;
                    nomeErroBiologico = label;
                }

                if (tipoCaso === "ligado-y" && sexo === "mulher" && (estadoUsuario === "afetado" || estadoUsuario === "portador")) {
                    erroBiologicoY = true;
                    nomeErroBiologico = label;
                }
                
                if (tipoCaso === "autossomico-dominante" && estadoUsuario === "portador") {
                    erroBiologicoDominante = true;
                    nomeErroBiologico = label;
                }

                if (estadoUsuario !== gabarito[id]) correto = false;
            });

            const fb = document.getElementById('mensagem-feedback');

      if (erroBiologicoX) {
                fb.innerHTML = `<b>ERRO CONCEITUAL:</b> Você marcou <b>${nomeErroBiologico}</b> como "Portador". Homens (XY) não podem esconder doenças ligadas ao X. Ou são Afetados, ou Saudáveis.`;
                fb.className = 'mensagem-feedback feedback-erro';
                registrarConclusaoSilenciosa("Heredograma: " + casos[casoAtual].nome + " (Montagem)", "Errou ❌");
                
            } else if (erroBiologicoY) {
                fb.innerHTML = `<b>ERRO CONCEITUAL:</b> Você atribuiu a condição a uma mulher (<b>${nomeErroBiologico}</b>). Analise o padrão de distribuição do traço na família: há restrições severas de gênero para esta patologia.`;
                fb.className = 'mensagem-feedback feedback-erro';
                registrarConclusaoSilenciosa("Heredograma: " + casos[casoAtual].nome + " (Montagem)", "Errou ❌");
                
            } else if (erroBiologicoDominante) {
                fb.innerHTML = `<b>ERRO CONCEITUAL:</b> Você marcou <b>${nomeErroBiologico}</b> como "Portador". Em doenças <b>Dominantes</b>, quem tem o gene manifesta a doença.`;
                fb.className = 'mensagem-feedback feedback-erro';
                registrarConclusaoSilenciosa("Heredograma: " + casos[casoAtual].nome + " (Montagem)", "Errou ❌");
                
            } else if (correto) {
                fb.innerHTML = `✅ <b>Mapeamento Perfeito!</b> Diagnóstico concluído com sucesso.`;
                fb.className = 'mensagem-feedback feedback-sucesso';
                registrarConclusaoSilenciosa("Heredograma: " + casos[casoAtual].nome + " (Montagem)", "Acertou ✅");
                
            } else {
                fb.innerHTML = `❌ <b>Incorreto.</b> Releia o prontuário. Verifique se os portadores fazem sentido anatômico para passar o gene adiante.`;
                fb.className = 'mensagem-feedback feedback-erro';
                registrarConclusaoSilenciosa("Heredograma: " + casos[casoAtual].nome + " (Montagem)", "Errou ❌");
            }
            
            fb.style.display = 'block';
        }
    </script>
    
    <!-- RASTREADOR INVISÍVEL COM STATUS DE ACERTO/ERRO -->
    <script>
        function registrarConclusaoSilenciosa(nomeDaAtividade, statusDaTentativa) {
            const nome = localStorage.getItem('genelab_nome') || 'Aluno Desconhecido';
            const matricula = localStorage.getItem('genelab_matricula') || 'Sem Matrícula';

            const urlDaPlanilha = "https://script.google.com/macros/s/AKfycbxStMWXUNEYWxU-_3FgvSKBGqQ8suRUDjAqkGJtNngI1NZ0d-X7_Dzjyq7zmwWQMTOy/exec";

            fetch(urlDaPlanilha, {
                method: 'POST',
                body: JSON.stringify({ 
                    nome: nome, 
                    matricula: matricula, 
                    modulo: nomeDaAtividade,
                    status: statusDaTentativa // Captura se foi Acerto ou Erro
                }),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' } 
            }).then(response => {
                console.log("Rastreado: " + nomeDaAtividade + " | " + statusDaTentativa);
            }).catch(error => {
                console.error("Erro no rastreador:", error);
            });
        }
    </script>
